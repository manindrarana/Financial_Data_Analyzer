app:
  name: "Financial Data Analyzer"
  version: "1.0.0"
  env: "development"

paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  database: "data/analytics/financial_data.duckdb"
  models: "data/models"

ingestion:
  active_provider: 
  - "yfinance"
  #- "binance or bybit for crypto"

  target_tickers: 
    - "AAPL"
    - "GOOGL"
    - "MSFT"

  settings:
    start_date: "2024-01-01"

providers:
  yfinance:
    interval: "1wk"


