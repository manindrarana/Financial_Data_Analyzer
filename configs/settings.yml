app:
  name: "Financial Data Analyzer"
  version: "1.0.0"
  env: "development"

paths:
  raw_data: "data/raw"
  processed_data: "data/processed"
  database: "data/analytics/financial_data.duckdb"
  models: "data/models"
  s3_bucket: "raw-data"

ingestion:
  active_provider: 
  - "yfinance"
  - "bybit"

  targets:
    yfinance: 
    - "AAPL"
    - "GOOGL"
    - "MSFT"
    - "AMZN"
    - "TSLA"
    - "META"
    bybit:
    - "BTCUSDT"
    - "ETHUSDT"
    - "SOLUSDT"
    - "ADAUSDT"
    - "XRPUSDT"
    - "LTCUSDT"
    - "DOGEUSDT"
    - "DOTUSDT"
    - "AVAXUSDT"
    - "DYDXUSDT"
    - "1000PEPEUSDT"

  settings:
    start_date: "2012-01-01"

providers:
  yfinance:
    intervals: ["1h", "1d", "1wk", "1mo"]
  
  bybit:
    category: "linear"
    intervals: ["60", "D", "W", "M"] # 60=1hr, D=Daily, W=Weekly, M=Monthly
    limit: 1000


